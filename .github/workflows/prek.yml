---
name: prek

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: prek
        uses: j178/prek-action@79f765515bd648eb4d6bb1b17277b7cb22cb6468 # v2
        with:
          extra-args: --all-files
